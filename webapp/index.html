<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>דגם תלת־ממדי מהמפות</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; overflow:hidden; background:#101418; font-family:"Segoe UI",Arial,sans-serif; }
  #c { width:100%; height:100%; display:block; touch-action:none; }
  #title {
    position:fixed; top:10px; right:12px; z-index:5; color:#fff;
    background:rgba(10,14,20,.65); backdrop-filter:blur(6px);
    padding:7px 12px; border-radius:12px; pointer-events:none; max-width:70vw;
  }
  #title h1 { font-size:15px; font-weight:600; }
  #title small { color:#9fc1e8; font-size:11px; }
  #fab {
    position:fixed; bottom:14px; right:14px; z-index:7;
    width:46px; height:46px; border-radius:50%; border:none;
    background:#2b6cb0; color:#fff; font-size:21px; cursor:pointer;
    box-shadow:0 2px 10px rgba(0,0,0,.5);
  }
  #panel {
    position:fixed; bottom:70px; right:14px; z-index:6; color:#eee;
    background:rgba(10,14,20,.78); backdrop-filter:blur(8px);
    padding:12px 14px; border-radius:14px; width:248px; max-width:calc(100vw - 28px);
    max-height:calc(100vh - 140px); overflow-y:auto;
  }
  #panel.hidden { display:none; }
  .row { margin-top:9px; font-size:13px; }
  .row:first-child { margin-top:0; }
  .row label { display:flex; justify-content:space-between; margin-bottom:2px; color:#cfe0f3; }
  input[type=range] { width:100%; accent-color:#4da3ff; }
  select {
    width:100%; padding:6px 8px; border-radius:8px; border:1px solid #3a4a5c;
    background:#16202c; color:#e8f1fa; font-size:13px; font-family:inherit;
  }
  .toggles { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
  .tbtn {
    flex:1; min-width:64px; text-align:center; font-size:12px; padding:7px 4px;
    border-radius:9px; border:1px solid #3a4a5c; color:#cfe0f3; cursor:pointer; user-select:none;
    background:rgba(255,255,255,.04);
  }
  .tbtn.on { background:#2b6cb0; border-color:#4da3ff; color:#fff; }
  #resetBtn { margin-top:10px; width:100%; padding:8px; border-radius:9px; border:none;
    background:#2b6cb0; color:#fff; font-size:13px; cursor:pointer; }
  #load {
    position:fixed; inset:0; z-index:10; background:#101418; color:#cfe0f3;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
  }
  #bar { width:220px; height:6px; background:#243040; border-radius:3px; overflow:hidden; }
  #barfill { height:100%; width:0%; background:#4da3ff; transition:width .2s; }
  #credit { position:fixed; bottom:4px; left:8px; z-index:4; color:#7a8ea3; font-size:10px; direction:ltr; }
  #zoomBar {
    position:fixed; left:10px; top:50%; transform:translateY(-50%); z-index:6;
    width:44px; height:280px; border-radius:22px;
    background:rgba(10,14,20,.72); backdrop-filter:blur(8px);
    display:flex; flex-direction:column; align-items:center; justify-content:space-between;
    padding:6px 0; user-select:none;
  }
  #zoomBar.hidden { display:none; }
  .zbtn {
    width:32px; height:32px; border-radius:50%; border:none; cursor:pointer;
    background:rgba(255,255,255,.09); color:#cfe0f3; font-size:17px; line-height:1;
  }
  .zbtn:active { background:#2b6cb0; }
  #zoomTrack { position:relative; flex:1; width:100%; margin:6px 0; }
  #zoomSlider {
    position:absolute; top:50%; left:50%; width:150px; margin:0;
    transform:translate(-50%,-50%) rotate(-90deg);
    accent-color:#4da3ff;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="title">
  <h1 id="placeName">דגם תלת־ממדי</h1>
  <small>נבנה אוטומטית ממפה טופוגרפית + תצלומי אוויר</small>
</div>

<button id="fab" title="פקדים">🎛</button>

<div id="zoomBar">
  <button class="zbtn" id="zHide" title="הסתרת הסרגל">✕</button>
  <button class="zbtn" id="zIn" title="התקרבות">＋</button>
  <div id="zoomTrack"><input id="zoomSlider" type="range" min="0" max="1000" step="1" value="500"></div>
  <button class="zbtn" id="zOut" title="התרחקות">－</button>
</div>

<div id="panel">
  <div class="row" id="siteRow" style="display:none">
    <label><span>אתר</span></label>
    <select id="siteSel"></select>
  </div>
  <div class="row">
    <label><span>הגזמת גובה</span><span id="exV">×2.0</span></label>
    <input id="ex" type="range" min="1" max="5" step="0.25" value="2">
  </div>
  <div class="row">
    <label><span>מפה טופוגרפית</span><span id="wtV">0%</span></label>
    <input id="wt" type="range" min="0" max="1" step="0.05" value="0">
  </div>
  <div class="row" id="roadsRow">
    <label><span>מפת כבישים</span><span id="wrV">0%</span></label>
    <input id="wr" type="range" min="0" max="1" step="0.05" value="0">
  </div>
  <div class="toggles">
    <div class="tbtn on" id="tBld">בתים</div>
    <div class="tbtn on" id="tVeg">צמחייה</div>
    <div class="tbtn" id="tCont">קווי גובה</div>
    <div class="tbtn on" id="tZoom">סרגל זום</div>
  </div>
  <button id="resetBtn">איפוס מבט</button>
</div>

<div id="credit">Imagery: Google · Maps: OpenTopoMap / OSM (CC-BY-SA)</div>

<div id="load">
  <div style="font-size:17px">טוען את הדגם…</div>
  <div id="bar"><div id="barfill"></div></div>
</div>

<script type="importmap">
{ "imports": { "three": "./js/three.module.min.js" } }
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from './js/OrbitControls.js';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(Math.max(innerWidth, 2), Math.max(innerHeight, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0e141c);
scene.fog = new THREE.Fog(0x0e141c, 2200, 4200);

const camera = new THREE.PerspectiveCamera(55, innerWidth / Math.max(innerHeight, 1), 1, 9000);
const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI * 0.49;
controls.minDistance = 15;
controls.maxDistance = 3200;
controls.zoomSpeed = 0.65;        // gentler wheel steps
controls.zoomToCursor = true;     // zoom toward the point under the cursor
controls.screenSpacePanning = false;

scene.add(new THREE.HemisphereLight(0xbfd6ee, 0x36322a, 0.9));
const sun = new THREE.DirectionalLight(0xffefd0, 1.4);
sun.position.set(500, 900, -300);
scene.add(sun);

// ---------- pick site ----------
const sites = await (await fetch('data/sites.json')).json();
const params = new URLSearchParams(location.search);
const siteId = sites.some(s => s.id === params.get('site')) ? params.get('site') : sites[0].id;
const D = 'data/' + siteId + '/';
if (sites.length > 1) {
  document.getElementById('siteRow').style.display = '';
  const sel = document.getElementById('siteSel');
  for (const s of sites) {
    const o = document.createElement('option');
    o.value = s.id; o.textContent = s.name; o.selected = s.id === siteId;
    sel.appendChild(o);
  }
  sel.addEventListener('change', () => { location.search = '?site=' + sel.value; });
}

// ---------- loading ----------
const barfill = document.getElementById('barfill');
let loaded = 0, total = 8;
function tick(){ loaded++; barfill.style.width = (loaded / total * 100) + '%'; }
const texLoader = new THREE.TextureLoader();
const loadTex = u => new Promise((res, rej) => texLoader.load(u, t => { tick(); res(t); }, undefined, rej));
const loadJson = async u => { const j = await (await fetch(u)).json(); tick(); return j; };

const [meta, heights, buildings, vegetation] = await Promise.all(
  ['meta.json', 'heights.json', 'buildings.json', 'vegetation.json'].map(f => loadJson(D + f)));
const hasRoads = meta.roads_rect && meta.roads_rect[2] > meta.roads_rect[0];
const [tA, tT, tC] = await Promise.all(
  ['texture_aerial.jpg', 'texture_topo.jpg', 'contours.png'].map(f => loadTex(D + f)));
let tR = null;
if (hasRoads) { try { tR = await loadTex(D + 'texture_roads.jpg'); } catch (e) {} }
else tick();
for (const t of [tA, tT, tR]) if (t) t.colorSpace = THREE.SRGBColorSpace;
tA.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
document.getElementById('placeName').textContent = meta.place;
document.title = meta.place + ' — דגם תלת־ממדי';

// ---------- terrain ----------
const GW = heights.gw, GH = heights.gh, Z = heights.z;
const WW = meta.world_w, WH = meta.world_h;
const ZMIN = meta.zmin;
let EX = 2;
const SKIRT = 25;

const cols = GW + 2, rows = GH + 2;
const pos = new Float32Array(cols * rows * 3);
const uv = new Float32Array(cols * rows * 2);
const vIndex = (i, j) => i * cols + j;
function gridZ(i, j){
  return Z[Math.min(GH - 1, Math.max(0, i)) * GW + Math.min(GW - 1, Math.max(0, j))];
}
function fillPositions(){
  for (let i = -1; i <= GH; i++){
    for (let j = -1; j <= GW; j++){
      const ci = Math.min(GH - 1, Math.max(0, i)), cj = Math.min(GW - 1, Math.max(0, j));
      const skirt = (i < 0 || i >= GH || j < 0 || j >= GW);
      const k = vIndex(i + 1, j + 1) * 3;
      pos[k] = (cj / (GW - 1) - 0.5) * WW;
      pos[k + 1] = skirt ? -SKIRT : (gridZ(i, j) - ZMIN) * EX;
      pos[k + 2] = (ci / (GH - 1) - 0.5) * WH;
    }
  }
}
fillPositions();
for (let i = -1; i <= GH; i++){
  for (let j = -1; j <= GW; j++){
    const ci = Math.min(GH - 1, Math.max(0, i)), cj = Math.min(GW - 1, Math.max(0, j));
    const k = vIndex(i + 1, j + 1) * 2;
    uv[k] = cj / (GW - 1); uv[k + 1] = 1 - ci / (GH - 1);
  }
}
const idx = [];
for (let i = 0; i < rows - 1; i++)
  for (let j = 0; j < cols - 1; j++){
    const a = vIndex(i, j), b = vIndex(i, j + 1), c2 = vIndex(i + 1, j), d = vIndex(i + 1, j + 1);
    idx.push(a, c2, b, b, c2, d);
  }
const skirtFlag = new Float32Array(cols * rows);
for (let i = -1; i <= GH; i++)
  for (let j = -1; j <= GW; j++)
    skirtFlag[vIndex(i + 1, j + 1)] = (i < 0 || i >= GH || j < 0 || j >= GW) ? 1 : 0;
const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
geo.setAttribute('uv', new THREE.BufferAttribute(uv, 2));
geo.setAttribute('aSkirt', new THREE.BufferAttribute(skirtFlag, 1));
geo.setIndex(idx);
geo.computeVertexNormals();

const uni = {
  tA: { value: tA }, tT: { value: tT }, tR: { value: tR || tT }, tC: { value: tC },
  wT: { value: 0 }, wR: { value: 0 }, wC: { value: 0 },
  roadsRect: { value: new THREE.Vector4(...(meta.roads_rect || [0, 0, 0, 0])) },
  lightDir: { value: new THREE.Vector3(0.45, 0.75, -0.3).normalize() },
  fogColor: { value: new THREE.Color(0x0e141c) },
  fogNear: { value: 2200 }, fogFar: { value: 4200 },
};
const terrainMat = new THREE.ShaderMaterial({
  uniforms: uni,
  vertexShader: `
    attribute float aSkirt;
    varying vec2 vUv; varying vec3 vN; varying float vDist; varying float vSkirt;
    void main(){
      vUv = uv;
      vSkirt = aSkirt;
      vN = normalize(normalMatrix * normal);
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      vDist = -mv.z;
      gl_Position = projectionMatrix * mv;
    }`,
  fragmentShader: `
    uniform sampler2D tA, tT, tR, tC;
    uniform float wT, wR, wC, fogNear, fogFar;
    uniform vec4 roadsRect;
    uniform vec3 lightDir, fogColor;
    varying vec2 vUv; varying vec3 vN; varying float vDist; varying float vSkirt;
    void main(){
      vec3 col = texture2D(tA, vUv).rgb;
      col = mix(col, texture2D(tT, vUv).rgb, wT);
      if (vUv.x > roadsRect.x && vUv.y > 1.0 - roadsRect.w && vUv.x < roadsRect.z && vUv.y < 1.0 - roadsRect.y){
        col = mix(col, texture2D(tR, vUv).rgb, wR);
      }
      col = mix(col, vec3(0.55, 0.30, 0.12), texture2D(tC, vUv).r * wC);
      vec3 n = normalize(vN);
      col *= 0.55 + 0.5 * max(dot(n, lightDir), 0.0);
      // diorama walls: solid dark slate instead of stretched texture
      col = mix(col, vec3(0.13, 0.15, 0.18), clamp(vSkirt * 4.0, 0.0, 1.0));
      float f = smoothstep(fogNear, fogFar, vDist);
      gl_FragColor = vec4(mix(col, fogColor, f), 1.0);
    }`,
});
scene.add(new THREE.Mesh(geo, terrainMat));

function terrainH(x, z){
  const fj = (x / WW + 0.5) * (GW - 1), fi = (z / WH + 0.5) * (GH - 1);
  const i0 = Math.min(GH - 2, Math.max(0, Math.floor(fi)));
  const j0 = Math.min(GW - 2, Math.max(0, Math.floor(fj)));
  const di = fi - i0, dj = fj - j0;
  return Z[i0 * GW + j0] * (1 - di) * (1 - dj) + Z[i0 * GW + j0 + 1] * (1 - di) * dj
       + Z[(i0 + 1) * GW + j0] * di * (1 - dj) + Z[(i0 + 1) * GW + j0 + 1] * di * dj - ZMIN;
}
const ovToWorld = (ox, oy) => [(ox / meta.ow - 0.5) * WW, (oy / meta.oh - 0.5) * WH];

// ---------- buildings: rotated footprint boxes, TRUE height (not exaggerated) ----------
const rects = buildings.rects || [];
const boxGeo = new THREE.BoxGeometry(1, 1, 1);
boxGeo.translate(0, 0.5, 0);
const bld = new THREE.InstancedMesh(boxGeo, new THREE.MeshLambertMaterial({ color: 0xffffff }), rects.length);
const tmp = new THREE.Object3D();
const tint = new THREE.Color();
function placeBuildings(){
  for (let k = 0; k < rects.length; k++){
    const [ox, oy, wm, hm, ang, hgt] = rects[k];
    const [x, z] = ovToWorld(ox, oy);
    tmp.position.set(x, terrainH(x, z) * EX - 0.8, z);
    tmp.scale.set(Math.max(wm, 2.2), hgt + 0.8, Math.max(hm, 2.2));
    tmp.rotation.set(0, -THREE.MathUtils.degToRad(ang), 0);
    tmp.updateMatrix();
    bld.setMatrixAt(k, tmp.matrix);
  }
  bld.instanceMatrix.needsUpdate = true;
}
for (let k = 0; k < rects.length; k++){
  const v = 0.62 + ((k * 2654435761) % 100) / 100 * 0.2;
  tint.setRGB(v, v * 0.95, v * 0.85);
  bld.setColorAt(k, tint);
}
placeBuildings();
scene.add(bld);

// ---------- vegetation: trees (cones) + shrubs (spheres), true heights ----------
const veg = vegetation.items || [];
const trees = veg.filter(v => v[4] === 1), shrubs = veg.filter(v => v[4] === 0);
const treeGeo = new THREE.ConeGeometry(0.5, 1, 7);
treeGeo.translate(0, 0.5, 0);
const shrubGeo = new THREE.SphereGeometry(0.5, 7, 5);
shrubGeo.scale(1, 0.7, 1);
shrubGeo.translate(0, 0.3, 0);
const treeMesh = new THREE.InstancedMesh(treeGeo, new THREE.MeshLambertMaterial({ color: 0x2d5a27 }), trees.length);
const shrubMesh = new THREE.InstancedMesh(shrubGeo, new THREE.MeshLambertMaterial({ color: 0x5a6b33 }), shrubs.length);
function placeVeg(){
  const put = (mesh, list) => {
    for (let k = 0; k < list.length; k++){
      const [ox, oy, r, h] = list[k];
      const [x, z] = ovToWorld(ox, oy);
      tmp.position.set(x, terrainH(x, z) * EX - 0.3, z);
      tmp.scale.set(r * 2, h, r * 2);
      tmp.rotation.set(0, (k * 0.71) % 6.28, 0);
      tmp.updateMatrix();
      mesh.setMatrixAt(k, tmp.matrix);
    }
    mesh.instanceMatrix.needsUpdate = true;
  };
  put(treeMesh, trees); put(shrubMesh, shrubs);
}
placeVeg();
scene.add(treeMesh); scene.add(shrubMesh);

// ---------- camera ----------
function resetView(){
  controls.target.set(0, 40, 0);
  camera.position.set(WW * 0.12, 420 + 90 * EX, WH * 0.85);
  controls.update();
}
resetView();

// ---------- UI ----------
const $ = id => document.getElementById(id);
$('ex').addEventListener('input', e => {
  EX = parseFloat(e.target.value);
  $('exV').textContent = '×' + EX.toFixed(2).replace(/\.?0+$/, '');
  fillPositions();
  geo.attributes.position.needsUpdate = true;
  geo.computeVertexNormals();
  placeBuildings(); placeVeg();
});
$('wt').addEventListener('input', e => { uni.wT.value = +e.target.value; $('wtV').textContent = Math.round(e.target.value * 100) + '%'; });
if (hasRoads && tR){
  $('wr').addEventListener('input', e => { uni.wR.value = +e.target.value; $('wrV').textContent = Math.round(e.target.value * 100) + '%'; });
} else {
  $('roadsRow').style.display = 'none';
}
$('tBld').addEventListener('click', () => { bld.visible = !bld.visible; $('tBld').classList.toggle('on', bld.visible); });
$('tVeg').addEventListener('click', () => {
  const v = !treeMesh.visible;
  treeMesh.visible = shrubMesh.visible = v;
  $('tVeg').classList.toggle('on', v);
});
$('tCont').addEventListener('click', () => {
  const on = uni.wC.value === 0;
  uni.wC.value = on ? 0.85 : 0;
  $('tCont').classList.toggle('on', on);
});
$('resetBtn').addEventListener('click', resetView);
const panel = $('panel');
$('fab').addEventListener('click', () => panel.classList.toggle('hidden'));
if (innerWidth < 640) panel.classList.add('hidden');

// ---------- distance ruler (log scale; top = close) ----------
const zoomBar = $('zoomBar'), zSlider = $('zoomSlider');
const MIND = controls.minDistance, MAXD = controls.maxDistance;
const lnMin = Math.log(MIND), lnMax = Math.log(MAXD);
const camDist = () => camera.position.distanceTo(controls.target);
function setDistance(d){
  d = Math.min(MAXD, Math.max(MIND, d));
  const dir = camera.position.clone().sub(controls.target);
  if (dir.lengthSq() < 1e-6) dir.set(0, 1, 0);
  dir.normalize().multiplyScalar(d);
  camera.position.copy(controls.target).add(dir);
  controls.update();
}
let draggingSlider = false;
function syncSlider(){
  if (draggingSlider) return;
  const v = 1000 * (1 - (Math.log(camDist()) - lnMin) / (lnMax - lnMin));
  zSlider.value = Math.round(Math.min(1000, Math.max(0, v)));
}
zSlider.addEventListener('pointerdown', () => { draggingSlider = true; });
addEventListener('pointerup', () => { draggingSlider = false; });
zSlider.addEventListener('input', () => {
  const f = 1 - zSlider.value / 1000;
  setDistance(Math.exp(lnMin + f * (lnMax - lnMin)));
});
$('zIn').addEventListener('click', () => { setDistance(camDist() * 0.75); syncSlider(); });
$('zOut').addEventListener('click', () => { setDistance(camDist() / 0.75); syncSlider(); });
controls.addEventListener('change', syncSlider);
syncSlider();
function setZoomBar(on){
  zoomBar.classList.toggle('hidden', !on);
  $('tZoom').classList.toggle('on', on);
}
$('zHide').addEventListener('click', () => setZoomBar(false));
$('tZoom').addEventListener('click', () => setZoomBar(zoomBar.classList.contains('hidden')));

addEventListener('resize', () => {
  camera.aspect = innerWidth / Math.max(innerHeight, 1);
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

document.getElementById('load').remove();

renderer.setAnimationLoop(() => {
  controls.update();
  // keep the camera above the terrain (prevents diving under / flipped view)
  const minY = terrainH(camera.position.x, camera.position.z) * EX + 6;
  if (camera.position.y < minY) camera.position.y = minY;
  if (controls.target.y < 0) controls.target.y = 0;
  renderer.render(scene, camera);
});

// debug hook: manual render + downscaled snapshot (works when rAF is throttled)
window.__app = { renderer, scene, camera, controls, resetView, uni, EX: () => EX };
window.__snap = (w = 320, q = 0.6) => {
  if (renderer.domElement.width < 8) {
    renderer.setSize(1280, 720, false);
    camera.aspect = 1280 / 720;
    camera.updateProjectionMatrix();
  }
  renderer.render(scene, camera);
  const src = renderer.domElement;
  const c2 = document.createElement('canvas');
  c2.width = w; c2.height = Math.round(w * src.height / src.width);
  c2.getContext('2d').drawImage(src, 0, 0, c2.width, c2.height);
  return c2.toDataURL('image/jpeg', q);
};
</script>
</body>
</html>
